---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.component }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.component }}-{{ .Values.env }}.kdevops.online
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.component }}-{{ .Values.env }}.kdevops.online
      http:
        paths:
          - pathType: Prefix
            backend:
              service:
                name: {{ .Values.component }}
                port:
                  number: 80
            path: /